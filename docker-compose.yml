name: bardic-tunes

services:
  bardic-tunes:
    image: ghcr.io/juandeodin/bardic-tunes:latest
    container_name: bardic-tunes
    restart: unless-stopped
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    volumes:
      - type: bind
        # ⚠️ Cambia esta ruta por la carpeta de música real en tu CasaOS
        source: /DATA/Media/Music
        target: /app/music
        read_only: true
      - type: bind
        # ⚠️ Carpeta REAL del host donde se guardan cuentas, partidas y tags.
        # Sobrevive a cualquier actualización/reinstalación de la app.
        # Crea la carpeta en tu CasaOS antes de arrancar (mkdir -p).
        source: /DATA/AppData/bardic-tunes/data
        target: /app/data
    environment:
      - NODE_ENV=production
      # Carpetas de música separadas por coma. Deben coincidir con los volúmenes montados abajo.
      # Ejemplo con varias carpetas: /app/music/rpg,/app/music/ambient
      - MUSIC_FOLDERS=/app/music
      # ⚠️ IMPORTANTE: Cambia esto por una cadena aleatoria y secreta (mín. 32 caracteres)
      # Si no lo configuras, los tokens de sesión expirarán al reiniciar el contenedor
      - JWT_SECRET=CAMBIA_ESTO_POR_UNA_CLAVE_SECRETA_LARGA_Y_ALEATORIA
    x-casaos:
      ports:
        - container: "3000"
          description:
            en_us: WebUI Port
      volumes:
        - container: /app/music
          description:
            en_us: "Music folder — change source path to your music directory"
        - container: /app/data
          description:
            en_us: "User data — accounts, campaigns and tags (bind to a persistent host folder)"

# Metadatos de CasaOS (panel, icono, WebUI)
x-casaos:
  architectures:
    - amd64
    - arm64
  main: bardic-tunes
  description:
    en_us: Web music player for tabletop RPG sessions
    es_es: Reproductor de música web para partidas de rol
  tagline:
    en_us: Fantasy music player for tabletop RPG
    es_es: Reproductor musical de fantasía para rol
  icon: https://cdn.jsdelivr.net/gh/Juandeodin/Bardic-Tunes@main/music/favicon.ico
  title:
    en_us: Bardic Tunes
  category: Entertainment
  port_map: "3000"
  scheme: http
