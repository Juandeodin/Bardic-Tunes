name: bardic-tunes

services:
  bardic-tunes:
    image: ghcr.io/juandeodin/bardic-tunes:latest
    container_name: bardic-tunes
    restart: unless-stopped
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    volumes:
      - type: bind
        # ⚠️ Cambia esta ruta por la carpeta de música real en tu CasaOS
        source: /DATA/Media/Music
        target: /app/music
        read_only: true
    environment:
      - NODE_ENV=production
      # Carpetas de música separadas por coma. Deben coincidir con los volúmenes montados abajo.
      # Ejemplo con varias carpetas: /app/music/rpg,/app/music/ambient
      - MUSIC_FOLDERS=/app/music
    x-casaos:
      ports:
        - container: "3000"
          description:
            en_us: WebUI Port
      volumes:
        - container: /app/music
          description:
            en_us: "Music folder — change source path to your music directory"

# Metadatos de CasaOS (panel, icono, WebUI)
x-casaos:
  architectures:
    - amd64
    - arm64
  main: bardic-tunes
  description:
    en_us: Web music player for tabletop RPG sessions
    es_es: Reproductor de música web para partidas de rol
  tagline:
    en_us: Fantasy music player for tabletop RPG
    es_es: Reproductor musical de fantasía para rol
  icon: https://cdn.jsdelivr.net/gh/Juandeodin/Bardic-Tunes@main/music/favicon.ico
  title:
    en_us: Bardic Tunes
  category: Entertainment
  port_map: "3000"
  scheme: http
  index: /
